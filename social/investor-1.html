<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>RangaMati Vatika — The Numbers</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    font-family: 'Lato', sans-serif;
    color: #fff;
    position: relative;
  }
  .bg {
    position: absolute;
    inset: 0;
    background: url('https://drive.google.com/thumbnail?id=1Fza9VkBOY4IowynQKxVsIIgFH-VUWnUn&sz=w1200') center/cover no-repeat;
  }
  .overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.55);
  }
  .content {
    position: relative;
    z-index: 2;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 80px 72px;
    text-align: center;
  }

  /* Top accent line */
  .accent-line {
    width: 64px;
    height: 3px;
    background: #C5A53B;
    margin-bottom: 40px;
  }

  /* Headline */
  .headline {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600;
    font-size: 72px;
    line-height: 1.1;
    letter-spacing: -1px;
    margin-bottom: 48px;
  }
  .headline span {
    color: #C5A53B;
  }

  /* Metrics row */
  .metrics {
    display: flex;
    gap: 0;
    margin-bottom: 48px;
    width: 100%;
    max-width: 820px;
  }
  .metric {
    flex: 1;
    padding: 28px 16px;
    border-left: 1px solid rgba(197,165,59,0.35);
  }
  .metric:first-child {
    border-left: none;
  }
  .metric-value {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 700;
    font-size: 40px;
    color: #C5A53B;
    margin-bottom: 6px;
  }
  .metric-label {
    font-size: 14px;
    font-weight: 300;
    letter-spacing: 2px;
    text-transform: uppercase;
    opacity: 0.8;
  }

  /* Subtext */
  .subtext {
    font-size: 19px;
    font-weight: 300;
    line-height: 1.65;
    max-width: 720px;
    opacity: 0.9;
    margin-bottom: 52px;
  }

  /* CTA badge */
  .cta {
    display: inline-block;
    border: 1.5px solid #C5A53B;
    padding: 16px 40px;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #C5A53B;
    background: rgba(197,165,59,0.08);
  }

  /* Bottom bar */
  .bottom-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 3;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 48px;
    background: rgba(0,0,0,0.45);
    border-top: 1px solid rgba(197,165,59,0.25);
  }
  .bottom-bar .brand {
    font-family: 'Cormorant Garamond', serif;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 1.5px;
    color: rgba(255,255,255,0.75);
  }
  .bottom-bar .url {
    font-size: 13px;
    font-weight: 300;
    letter-spacing: 1px;
    color: rgba(197,165,59,0.7);
  }
</style>
</head>
<body>
  <div class="bg"></div>
  <div class="overlay"></div>
  <div class="content">
    <div class="accent-line"></div>
    <h1 class="headline"><span>&#8377;1 Crore</span> &rarr; <span>&#8377;2 Crores</span></h1>
    <div class="metrics">
      <div class="metric">
        <div class="metric-value">2.0x</div>
        <div class="metric-label">Returns</div>
      </div>
      <div class="metric">
        <div class="metric-value">18-24</div>
        <div class="metric-label">Months</div>
      </div>
      <div class="metric">
        <div class="metric-value">Land</div>
        <div class="metric-label">Backed</div>
      </div>
    </div>
    <p class="subtext">Ground-floor entry into a Ganga-frontage biophilic community. 97 Kathas. 75 units. Construction-ready.</p>
    <div class="cta">Seed Round Open &nbsp;|&nbsp; &#8377;2.5Cr Total Raise</div>
  </div>
  <div class="bottom-bar">
    <div class="brand">RangaMati Vatika &nbsp;|&nbsp; KarmYog for 21st Century</div>
    <div class="url">rangamati-vatika.vercel.app</div>
  </div>
</body>
</html>
